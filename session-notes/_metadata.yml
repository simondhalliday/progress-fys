# Applied to every page in session-notes/ automatically
format:
  html:
    toc: true
    toc-depth: 3
    toc-title: "On this page"
    include-in-header:
      text: |
        <!-- Orbit spaced-repetition web component — must be in <head> for custom elements to upgrade correctly -->
        <script type="module" src="https://js.withorbit.com/orbit-web-component.js"></script>
        <!-- Default Orbit colour for all review areas on session-notes pages -->
        <meta property="orbit:color" content="orange" />
        <!-- Section pagination script -->
        <script src="../paginate.js" defer></script>
